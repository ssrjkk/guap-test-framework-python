name: QA Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest-cov
          
      - name: Run flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503,W292

  api-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt pytest allure-pytest
        
      - name: Run API tests
        run: |
          pytest api_tests/ -v --tb=short \
            --allure-results-path=allure-results \
            -m "not negative" || true
          
      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results
          retention-days: 7

  ui-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install -r requirements.txt pytest allure-pytest
      
      - name: Run UI tests
        run: |
          pytest ui_tests/ -v --tb=short \
            --allure-results-path=allure-results \
            -m "not slow" || true
          
      - name: Upload allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-ui
          path: allure-results
          retention-days: 7
          
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-screenshots
          path: screenshots
          retention-days: 7

  generate-report:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results-api
          
      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results-ui
          
      - name: Install Allure
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.zip -O allure.zip
          unzip -q allure.zip -d /opt
          echo "/opt/allure-2.24.0/bin" >> $GITHUB_PATH
          
      - name: Generate report
        run: |
          allure generate allure-results-api allure-results-ui -o allure-report --clean || true
          
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

  summary:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, generate-report]
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the Allure report artifact for detailed results." >> $GITHUB_STEP_SUMMARY